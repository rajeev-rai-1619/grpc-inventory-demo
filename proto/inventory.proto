syntax = "proto3";

package inventory;

option go_package = "grpc-inventory-demo/proto;inventorypb";

service InventoryService {
  rpc CheckStock(StockRequest) returns (StockResponse);
}

message StockRequest {
  string item_id = 1;
  int32 requested_qty = 2;
}

message StockResponse {
  bool available = 1;
  int32 remaining_qty = 2;
}
